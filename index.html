<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div class="container">
        <header>
            <h1>로또 번호 추천기</h1>
            <button id="theme-toggle" class="btn-icon" title="테마 변경">
                <span id="theme-icon">🌙</span>
            </button>
        </header>
        
        <main>
            <div id="lotto-container" class="lotto-display">
                <!-- 번호가 여기에 생성됩니다 -->
                <div class="placeholder">행운의 번호를 확인하세요!</div>
            </div>
            
            <button id="generate-btn" class="btn-primary">번호 생성하기</button>

            <section class="history-section">
                <h2>최근 생성 번호</h2>
                <div id="history-list" class="history-list">
                    <p class="empty-history">아직 생성된 번호가 없습니다.</p>
                </div>
                <button id="clear-history" class="btn-secondary">기록 삭제</button>
            </section>

            <section class="contact-section">
                <h2>제휴 문의</h2>
                <form action="https://formspree.io/f/your-form-id" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">성함 / 업체명</label>
                        <input type="text" id="name" name="name" placeholder="홍길동" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">문의 보내기</button>
                </form>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 로또 번호 추천기</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
