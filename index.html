<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div class="container">
        <header>
            <h1>로또 번호 추천기</h1>
            <button id="theme-toggle" class="btn-icon" title="테마 변경">
                <span id="theme-icon">🌙</span>
            </button>
        </header>
        
        <main>
            <div id="lotto-container" class="lotto-display">
                <!-- 번호가 여기에 생성됩니다 -->
                <div class="placeholder">행운의 번호를 확인하세요!</div>
            </div>
            
            <button id="generate-btn" class="btn-primary">번호 생성하기</button>
        </main>
        
        <footer>
            <p>&copy; 2026 로또 번호 추천기</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
